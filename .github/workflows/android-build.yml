name: Build Android APK

# Tell the robot to run every time you push code to 'main'
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Also adds a manual "Run" button on GitHub

# Give the robot security clearance to create an official Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter (The engine behind Flet)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet Build Tools
        run: pip install flet

      - name: Build the APK!
        run: flet build apk

      # Keeps the temporary zip file just in case you need a backup
      - name: Upload the finished APK
        uses: actions/upload-artifact@v4
        with:
          name: HabitTracker-Android-App
          path: build/apk/**/*.apk

      # THE NEW OBTAINIUM PIPELINE
      - name: Publish Official GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Tabit Build ${{ github.run_number }}
          files: build/apk/**/*.apk
